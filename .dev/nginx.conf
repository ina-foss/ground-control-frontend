user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Cache settings for VOD (doit être dans le bloc http)
    vod_metadata_cache metadata_cache 512m;
    vod_response_cache response_cache 128m;
    vod_mapping_cache mapping_cache 64m;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json application/x-javascript;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # VOD module configuration for HLS
        location /vod/ {
            vod hls;
            vod_mode local;
            vod_segment_duration 6000;
            vod_align_segments_to_key_frames on;

            # CORS headers for video streaming
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Origin, Range' always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }

            alias /usr/share/nginx/html/videos/;
        }

        # VOD module configuration for DASH
        location /dash/ {
            vod dash;
            vod_mode local;
            vod_segment_duration 6000;

            # CORS headers
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Origin, Range' always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }

            alias /usr/share/nginx/html/videos/;
        }

        # VOD module configuration for MSS (Microsoft Smooth Streaming)
        location /mss/ {
            vod mss;
            vod_mode local;
            vod_segment_duration 6000;

            # CORS headers
            add_header Access-Control-Allow-Origin * always;

            alias /usr/share/nginx/html/videos/;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Disable cache for HTML files
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        # Direct video file access with range support
        location ~* \.(mp4|m4v|mov|mkv|avi|webm|flv)$ {
            mp4;
            add_header Access-Control-Allow-Origin * always;
            add_header Cache-Control "public, max-age=31536000";
        }

        # SPA fallback - redirect all requests to index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # VOD status endpoint
        location /vod_status {
            vod_status;
            access_log off;
        }

        # Prevent access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
